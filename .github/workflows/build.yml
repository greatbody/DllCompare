name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build and package ${{ matrix.platform }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            runtime: win-x64
          - platform: x86
            runtime: win-x86
          - platform: ARM64
            runtime: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Restore
        run: dotnet restore "DllCompare.sln" -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build "DllCompare.sln" --configuration Release --no-restore -p:Platform=${{ matrix.platform }} -p:PublishReadyToRun=false

      - name: Publish
        run: >
          dotnet publish "DllCompare\DllCompare.csproj"
          --configuration Release
          --no-restore
          -p:Platform=${{ matrix.platform }}
          -r ${{ matrix.runtime }}
          --self-contained true
          -p:PublishReadyToRun=false
          -p:PublishDir="${{ github.workspace }}\artifacts\publish\${{ matrix.runtime }}\"

      - name: Package zip
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}\artifacts\publish\${{ matrix.runtime }}"
          $packageDir = "${{ github.workspace }}\artifacts\packages"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Compress-Archive -Path "$publishDir\*" -DestinationPath "$packageDir\DllCompare-${{ matrix.runtime }}.zip" -Force

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: 0.1.${{ github.run_number }}
          PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\${{ matrix.runtime }}
          INSTALLER_OUTPUT_DIR: ${{ github.workspace }}\artifacts\installers
          RUNTIME_IDENTIFIER: ${{ matrix.runtime }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:INSTALLER_OUTPUT_DIR | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "${{ github.workspace }}\installer\DllCompare.iss"

      - name: Upload zip package
        uses: actions/upload-artifact@v7
        with:
          name: DllCompare-${{ matrix.runtime }}-zip
          path: artifacts/packages/DllCompare-${{ matrix.runtime }}.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: DllCompare-${{ matrix.runtime }}-installer
          path: artifacts/installers/DllCompare-Setup-${{ matrix.runtime }}.exe
          if-no-files-found: error
